<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validación de Carnet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .validacion-box{
      width:100%;
      max-width:560px;
      background:#fff;
      border-radius:22px;
      box-shadow:0 18px 45px rgba(0,0,0,.14);
      padding:28px 22px;
      text-align:center;
    }

    .validacion-logo{
      width:auto;
      height:72px;
      object-fit:contain;
      margin-bottom:10px;
    }

    .validacion-estado{
      font-size:30px;
      font-weight:900;
      margin:12px 0 10px;
    }

    .estado-activo{ color:#138a46; }
    .estado-inactivo{ color:#c62828; }

    .validacion-detalle{
      margin-top:16px;
      font-size:16px;
      line-height:1.6;
      color:#333;
    }

    .validacion-mensaje{
      margin-top:12px;
      color:#666;
      font-size:15px;
    }

    .validacion-loader{
      width:48px;
      height:48px;
      border:4px solid rgba(0,0,0,0.10);
      border-top:4px solid #0f7a43;
      border-radius:50%;
      margin:16px auto;
      animation:spin .8s linear infinite;
    }
  </style>
</head>
<body>
  <div class="validacion-box">
    <img src="logo-elevar.png" alt="Logo Elevar" class="validacion-logo">
    <h1>Obra Social Pasteleros Mendoza</h1>
    <p class="muted">Validación online de carnet</p>

    <div id="resultado">
      <div class="validacion-loader"></div>
      <p class="validacion-mensaje">Consultando estado del afiliado...</p>
    </div>
  </div>

  <script src="validar.js"></script>
</body>
</html>
